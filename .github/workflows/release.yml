name: Release

# Publishes the package to npm when a `v*` tag is pushed.
#
# Authentication: npm Trusted Publishing (OIDC). No `NPM_TOKEN` secret
# required. Before this workflow can publish, a Trusted Publisher must be
# configured on npmjs.com for the `schema-extractor` package:
#
#   npmjs.com → Packages → schema-extractor → Settings → Publishing access
#   → Add trusted publisher:
#       Publisher:           GitHub Actions
#       Organization / user: clouds56-hello
#       Repository:          schema-extractor
#       Workflow filename:   release.yml
#       Environment name:    npm
#
# The publish job runs under the `npm` GitHub Environment so npm's trusted
# publisher config matches and any environment protection rules apply.
# `id-token: write` permission lets GitHub mint the OIDC token that the
# npm CLI exchanges for a short-lived publish credential. `--provenance`
# emits a signed attestation alongside the publish.

on:
  push:
    tags: ['v*']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run CI checks
        run: bun run ci

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          tag="${TAG_REF#v}"
          pkg=$(node -p "require('./package.json').version")
          echo "tag=$tag pkg=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Build dist
        run: bun run build

      - name: Publish
        run: npm publish --access public --provenance

name: Release

# Publishes the package to npm when a `v*` tag is pushed.
#
# Required repo secret:
#   NPM_TOKEN — npm granular access token with publish permission for
#               the `schema-extractor` package. Set this on the `npm`
#               GitHub Environment (Settings → Environments → npm) so the
#               token is only exposed to jobs that pass the environment's
#               protection rules.
#
# The publish job uses npm's `--provenance` flag, which requires
# `id-token: write` permission so GitHub OIDC can sign the package.

on:
  push:
    tags: ['v*']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run CI checks
        run: bun run ci

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          tag="${TAG_REF#v}"
          pkg=$(node -p "require('./package.json').version")
          echo "tag=$tag pkg=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Build dist
        run: bun run build

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

name: Release

# Publishes the package to npm when a v* tag passes CI.
#
# Required repo secret:
#   NPM_TOKEN — npm granular access token with publish permission for
#               the `schema-extractor` package.
#
# Workflow uses npm's `--provenance` flag, which requires `id-token: write`
# permission so GitHub OIDC can sign the package.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  publish:
    if: >-
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v') &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        env:
          TAG_REF: ${{ github.event.workflow_run.head_branch }}
        run: |
          tag="${TAG_REF#v}"
          pkg=$(node -p "require('./package.json').version")
          echo "tag=$tag pkg=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Build dist
        run: bun run build

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
